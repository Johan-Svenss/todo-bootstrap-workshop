<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Todo App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5">

    <h1 class="text-center display-4 mb-5">Johan's Todo App 2.0</h1>

    <!-- FORM CARD -->
    <div class="card shadow-sm p-4 mb-4">
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" id="titleInput" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea id="descriptionInput" class="form-control"></textarea>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Due Date</label>
                <input type="date" id="dateInput" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Attachments</label>
                <input type="file" id="fileInput" class="form-control">
            </div>
        </div>

        <button class="btn btn-primary align-self-end" id="addButton">
            <i class="bi bi-plus-lg"></i> Add Todo
        </button>
    </div>

<!-- TODO LIST -->
<div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">

        <h5 class="mb-0">Todos</h5>

        <div class="d-flex gap-2">

            <!-- FILTER -->
            <select id="filterSelect" class="form-select form-select-sm">
                <option value="all">All</option>
                <option value="active">Active</option>
                <option value="completed">Completed</option>
            </select>

            <!-- SORT -->
            <select id="sortSelect" class="form-select form-select-sm">
                <option value="newest">Sort: Newest</option>
                <option value="dueDate">Sort: Due Date</option>
            </select>

        </div>
    </div>

    <div class="card-body" id="todoList"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
