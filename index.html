<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced To-Do List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .todo-card {
            max-width: 700px;
            margin: auto;
            margin-top: 60px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background-color: white;
        }

        .completed {
            text-decoration: line-through;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="todo-card">

    <h2 class="text-center mb-4">To-Do List</h2>

    <!-- FORM -->
    <div class="mb-3">
        <input type="text" id="titleInput" class="form-control mb-2" placeholder="Title">

        <textarea id="descriptionInput" class="form-control mb-2" placeholder="Description"></textarea>

        <input type="date" id="dateInput" class="form-control mb-2">

        <input type="file" id="fileInput" class="form-control mb-2">

        <button class="btn btn-primary w-100" id="addButton">Add Task</button>
    </div>

    <!-- LIST -->
    <ul class="list-group" id="todoList"></ul>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const addButton = document.getElementById("addButton");
const titleInput = document.getElementById("titleInput");
const descriptionInput = document.getElementById("descriptionInput");
const dateInput = document.getElementById("dateInput");
const fileInput = document.getElementById("fileInput");
const todoList = document.getElementById("todoList");

addButton.addEventListener("click", function () {

    const title = titleInput.value;
    const description = descriptionInput.value;
    const date = dateInput.value;
    const file = fileInput.files[0];

    if (title === "") {
        alert("Title is required!");
        return;
    }

    // Create list item
    const li = document.createElement("li");
    li.className = "list-group-item";

    // Create checkbox
    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.className = "form-check-input me-2";

    // Task content container
    const contentDiv = document.createElement("div");
    contentDiv.className = "mt-2";

    contentDiv.innerHTML = `
        <h5>${title}</h5>
        <p>${description}</p>
        <small>Due: ${date}</small><br>
        <small>File: ${file ? file.name : "No file attached"}</small>
    `;

    // When checkbox is clicked
    checkbox.addEventListener("change", function () {
        contentDiv.classList.toggle("completed");
    });

    // Buttons container
    const buttonDiv = document.createElement("div");
    buttonDiv.className = "mt-3";

    // Edit button
    const editButton = document.createElement("button");
    editButton.className = "btn btn-warning btn-sm me-2";
    editButton.textContent = "Edit";

    editButton.addEventListener("click", function () {
        titleInput.value = title;
        descriptionInput.value = description;
        dateInput.value = date;
        li.remove();
    });

    // Delete button
    const deleteButton = document.createElement("button");
    deleteButton.className = "btn btn-danger btn-sm";
    deleteButton.textContent = "Delete";

    deleteButton.addEventListener("click", function () {
        li.remove();
    });

    buttonDiv.appendChild(editButton);
    buttonDiv.appendChild(deleteButton);

    li.appendChild(checkbox);
    li.appendChild(contentDiv);
    li.appendChild(buttonDiv);

    todoList.appendChild(li);

    // Clear form
    titleInput.value = "";
    descriptionInput.value = "";
    dateInput.value = "";
    fileInput.value = "";

});

</script>

</body>
</html>
